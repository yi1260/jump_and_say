<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <title>Static Feedback - Great</title>
  
  <!-- 静态的点缀四角星 -->
  <g fill="#58CC02">
    <path d="M 0 -12 Q 0 0 12 0 Q 0 0 0 12 Q 0 0 -12 0 Q 0 0 0 -12 Z" transform="translate(70, 40)" />
    <path d="M 0 -16 Q 0 0 16 0 Q 0 0 0 16 Q 0 0 -16 0 Q 0 0 0 -16 Z" transform="translate(330, 150)" />
    <path d="M 0 -8 Q 0 0 8 0 Q 0 0 0 8 Q 0 0 -8 0 Q 0 0 0 -8 Z" transform="translate(340, 50)" />
  </g>

  <!-- 底部厚度阴影 (深绿) -->
  <rect x="60" y="68" width="280" height="80" rx="40" fill="#58A700" />
  
  <!-- 顶层主体 (活力绿) -->
  <rect x="60" y="58" width="280" height="80" rx="40" fill="#58CC02" />
  
  <!-- 顶层果冻高光 -->
  <rect x="80" y="66" width="240" height="14" rx="7" fill="#FFFFFF" opacity="0.35" />

  <!-- 文字排版 (带底色阴影) -->
  <text x="200" y="104" font-family="'Arial Rounded MT Bold', 'Nunito', sans-serif" font-size="36" font-weight="900" text-anchor="middle" dominant-baseline="central" letter-spacing="2" fill="#58A700">GREAT !</text>
  <text x="200" y="98" font-family="'Arial Rounded MT Bold', 'Nunito', sans-serif" font-size="36" font-weight="900" text-anchor="middle" dominant-baseline="central" letter-spacing="2" fill="#FFFFFF">GREAT !</text>
</svg>
