<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 400" width="50" height="200">
  <title>Energy Bar Outer Track</title>

  <!-- 背景凹槽 (极低透明度的灰蓝色) -->
  <rect x="20" y="20" width="60" height="360" rx="30" fill="#5C6A7A" opacity="0.08" />
  
  <!-- 外边框加粗描边 -->
  <rect x="20" y="20" width="60" height="360" rx="30" fill="none" stroke="#5C6A7A" stroke-width="8" />

  <!-- 背景刻度指示线 -->
  <g opacity="0.2" stroke="#5C6A7A" stroke-width="4" stroke-linecap="round">
    <line x1="32" y1="83" x2="68" y2="83" />
    <line x1="32" y1="141" x2="68" y2="141" />
    <line x1="32" y1="200" x2="68" y2="200" />
    <line x1="32" y1="258" x2="68" y2="258" />
    <line x1="32" y1="317" x2="68" y2="317" />
  </g>

</svg>