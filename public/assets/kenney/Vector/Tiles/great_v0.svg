<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <title>Golden Medal - GREAT !</title>
  <defs>
    <style>
      /* 进场弹跳与持续悬浮 */
      .medal-bounce {
        transform-origin: 200px 150px;
        transform: scale(1);
        opacity: 1;
      }

      /* 闪烁的胜利星星 */
      .sparkle {
        transform-origin: center;
        transform: scale(1);
        opacity: 1;
      }

      /* 圆润粗体字 */
      .text-chunky {
        font-family: 'Arial Rounded MT Bold', 'Nunito', sans-serif;
        font-size: 36px;
        font-weight: 900;
        text-anchor: middle;
        dominant-baseline: central;
        letter-spacing: 2px;
      }
    </style>
  </defs>

  <g class="medal-bounce">
    
    <!-- === 环境点缀：闪烁的星星 === -->
    <g fill="#FBBF24">
      <path class="sparkle s1" d="M 0 -12 Q 0 0 12 0 Q 0 0 0 12 Q 0 0 -12 0 Q 0 0 0 -12 Z" transform="translate(60, 60)" />
      <path class="sparkle s2" d="M 0 -16 Q 0 0 16 0 Q 0 0 0 16 Q 0 0 -16 0 Q 0 0 0 -16 Z" transform="translate(330, 80)" />
      <path class="sparkle s3" d="M 0 -8 Q 0 0 8 0 Q 0 0 0 8 Q 0 0 -8 0 Q 0 0 0 -8 Z" transform="translate(100, 240)" />
      <path class="sparkle" d="M 0 -10 Q 0 0 10 0 Q 0 0 0 10 Q 0 0 -10 0 Q 0 0 0 -10 Z" transform="translate(310, 230)" />
    </g>

    <!-- === 奖牌后面的绶带燕尾 (Ribbon Tails) === -->
    <polygon points="15,170 70,170 70,220 15,220 35,195" fill="#991B1B" />
    <polygon points="385,170 330,170 330,220 385,220 365,195" fill="#991B1B" />

    <!-- === 奖牌主体 (圆形) === -->
    <!-- 1. 奖牌外环阴影厚度 -->
    <circle cx="200" cy="130" r="85" fill="#D97706" />
    <!-- 2. 奖牌外环金边 -->
    <circle cx="200" cy="120" r="85" fill="#FBBF24" />
    <!-- 3. 奖牌内环凹陷阴影 -->
    <circle cx="200" cy="120" r="70" fill="#F59E0B" />
    <!-- 4. 奖牌内环亮面 -->
    <circle cx="200" cy="116" r="70" fill="#FEF08A" />

    <!-- 奖牌左上角的光泽高光 -->
    <path d="M 135 90 A 75 75 0 0 1 180 45" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.6" />

    <!-- === 奖牌中心的圆润大五角星 === -->
    <g>
      <!-- 星星阴影 -->
      <path d="M 200 76 L 211 102 L 238 102 L 216 118 L 225 145 L 200 129 L 175 145 L 184 118 L 162 102 L 189 102 Z" 
            fill="#F59E0B" stroke="#F59E0B" stroke-width="10" stroke-linejoin="round" transform="translate(0, 8)" />
      <!-- 星星亮面 -->
      <path d="M 200 76 L 211 102 L 238 102 L 216 118 L 225 145 L 200 129 L 175 145 L 184 118 L 162 102 L 189 102 Z" 
            fill="#FFFFFF" stroke="#FFFFFF" stroke-width="10" stroke-linejoin="round" />
    </g>

    <!-- === 覆盖在奖牌上方的前置横向绶带 === -->
    <!-- 绶带阴影 -->
    <rect x="60" y="170" width="280" height="65" rx="20" fill="#B91C1C" />
    <!-- 绶带主体 -->
    <rect x="60" y="160" width="280" height="65" rx="20" fill="#EF4444" />
    <!-- 绶带高光 (果冻感) -->
    <rect x="80" y="168" width="240" height="12" rx="6" fill="#FFFFFF" opacity="0.3" />

    <!-- === 文字排版 === -->
    <!-- 3D 深色文字底 -->
    <text x="200" y="202" class="text-chunky" fill="#991B1B">GREAT !</text>
    <!-- 白色文字面 -->
    <text x="200" y="196" class="text-chunky" fill="#FFFFFF">GREAT !</text>

  </g>
</svg>
