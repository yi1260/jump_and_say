<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>横版闯关测试 - Jump And Say</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
    }

    @media (max-width: 640px) {
      #controls {
        left: 8px;
        right: 8px;
        top: 8px;
        max-height: 42vh;
        overflow: auto;
        padding: 10px !important;
        font-size: 12px !important;
      }

      #controls h3 {
        font-size: 16px;
      }

      #controls ul {
        font-size: 11px !important;
      }

      #controls button {
        width: calc(50% - 4px);
        margin-left: 0 !important;
        padding: 7px 8px !important;
        font-size: 12px !important;
      }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- 控制面板 -->
  <div id="controls" style="position: fixed; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; color: #fff; font-size: 14px;">
    <h3 style="margin: 0 0 10px 0; color: #FFD700;">🎮 英语学习闯关</h3>
    <p style="margin: 5px 0;"><strong>控制方式：</strong></p>
    <ul style="margin: 5px 0; padding-left: 20px; font-size: 13px;">
      <li>← → 左右移动</li>
      <li>↑ / 空格 跳跃</li>
      <li>踩敌人消灭 (+ 获得分数)</li>
      <li>撞击黄色方块进入答题</li>
    </ul>
    <div style="margin-top: 10px; padding: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; font-size: 12px;">
      <p style="margin: 0;">💡 <strong>玩法：</strong>通过5个答题门到达终点</p>
      <p style="margin: 4px 0 0 0;">🛡️ 答题正确率 ≥60% 获得护盾！</p>
    </div>
    <button id="restart-btn" style="margin-top: 10px; padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">
      🔄 重新开始
    </button>
    <button id="back-btn" style="margin-left: 5px; padding: 8px 16px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">
      🏠 返回主菜单
    </button>
  </div>

  <script type="module">
    import Phaser from 'phaser';
    import { PlatformScene } from './game/scenes/PlatformScene.ts';
    import { MarioScene } from './game/scenes/MarioScene.ts';

    const getViewportDpr = () => Math.min(window.devicePixelRatio || 1, 3);
    const getGameSize = () => {
      const dpr = getViewportDpr();
      return {
        width: Math.round(window.innerWidth * dpr),
        height: Math.round(window.innerHeight * dpr),
        zoom: 1 / dpr
      };
    };
    const gameSize = getGameSize();
    const config = {
      type: Phaser.AUTO,
      parent: 'game-container',
      width: gameSize.width,
      height: gameSize.height,
      backgroundColor: '#FFFFFF',
      render: {
        antialias: true,
        pixelArt: false,
        roundPixels: false,
        powerPreference: 'high-performance'
      },
      physics: {
        default: 'arcade',
        arcade: {
          gravity: { x: 0, y: 2500 },
          debug: false
        }
      },
      scene: [MarioScene, PlatformScene],
      scale: {
        mode: Phaser.Scale.NONE,
        autoCenter: Phaser.Scale.NO_CENTER,
        zoom: gameSize.zoom
      }
    };

    const game = new Phaser.Game(config);
    window.__platformTestGame = game;

    const resizeGame = () => {
      const nextSize = getGameSize();
      game.scale.setZoom(nextSize.zoom);
      game.scale.resize(nextSize.width, nextSize.height);
    };
    window.addEventListener('resize', resizeGame);
    window.addEventListener('orientationchange', resizeGame);

    document.getElementById('restart-btn').addEventListener('click', () => {
      game.scene.start('MarioScene');
    });

    document.getElementById('back-btn').addEventListener('click', () => {
      window.location.href = '/';
    });

    console.log('[横版闯关测试] 游戏已启动！');
    console.log('[横版闯关测试] 使用 ← → 移动，↑ 或空格跳跃');
  </script>
</body>
</html>
